name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Pre-merge checks
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supernova
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/supernova
      API_PORT: "4000"
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      JWT_SECRET: ci-placeholder-secret-not-used-by-static-checks
      JWT_EXPIRES_IN: 8h
      TEMP_PASSWORD_ENCRYPTION_KEY: ci-placeholder-temp-password-key-not-used
      AUTH_COOKIE_NAME: supernova_session

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
