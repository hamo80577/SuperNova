services:
  postgres:
    image: postgres:16-alpine
    container_name: supernova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supernova}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-supernova}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["app"]
    image: node:22-alpine
    container_name: supernova-api
    working_dir: /workspace
    command: sh -c "npm install && npm run prisma:generate && npm run dev --workspace @supernova/api"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/supernova}
      API_PORT: ${API_PORT:-4000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-supernova_session}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  web:
    profiles: ["app"]
    image: node:22-alpine
    container_name: supernova-web
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @supernova/web"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./:/workspace
    depends_on:
      - api

  redis:
    profiles: ["future"]
    image: redis:7-alpine
    container_name: supernova-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres-data:
